<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Adventure - Nesha</title>
    <style>
        /* Import Minecraft Font */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --mc-font: 'VT323', monospace;
            --mc-green: #3c8d2d;
            --mc-shadow: #1e1e1e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--mc-font);
            color: white;
            image-rendering: pixelated; /* Penting untuk estetika pixel */
        }

        /* --- BACKGROUND MOVING PANORAMA --- */
        .panorama-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://minecraft.wiki/images/Panorama_Plain_JE1.png?f63ac'); /* Ganti dengan URL panorama favoritmu */
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.6);
            z-index: -1;
            animation: panoramaScroll 60s linear infinite;
        }

        @keyframes panoramaScroll {
            from { background-position: 0% center; }
            to { background-position: 100% center; }
        }

        /* --- UI ELEMENTS (MAIN CONTAINER) --- */
        .ui-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .mc-panel {
            background: rgba(139, 139, 139, 0.9); /* Dirt/Stone menu color */
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px #dbdbdb, 10px 10px 0px rgba(0,0,0,0.5);
            padding: 30px;
            text-align: center;
            width: 380px;
            transition: transform 0.3s ease;
        }

        .mc-panel:hover {
            transform: scale(1.02);
        }

        /* Teks Judul Minecraft */
        .mc-logo {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 4px 4px 0px var(--mc-shadow);
            margin-top: 0;
            margin-bottom: 5px;
        }

        /* Yellow Splash Text */
        .splash-text {
            color: #FFFF55;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0px #3F3F00;
            display: inline-block;
            transform: rotate(-15deg);
            position: relative;
            top: -10px;
            right: -80px;
            animation: splashPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes splashPulse {
            from { transform: rotate(-15deg) scale(1); }
            to { transform: rotate(-15deg) scale(1.1); }
        }

        /* --- FORM STYLING --- */
        p { font-size: 1.4rem; margin-bottom: 5px; }
        
        input[type="text"] {
            font-family: var(--mc-font);
            font-size: 1.5rem;
            background-color: #000;
            border: 2px solid #555;
            color: #55ff55;
            padding: 8px;
            width: 80%;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
        }

        /* --- MC BUTTON STYLING --- */
        .mc-btn {
            font-family: var(--mc-font);
            font-size: 1.8rem;
            color: white;
            background-color: #6e6e6e;
            border: 4px solid #000;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
            padding: 10px 0;
            width: 100%;
            cursor: pointer;
            position: relative;
            text-shadow: 2px 2px 0px var(--mc-shadow);
            transition: background 0.1s;
        }

        .mc-btn:active {
            border-color: #dbdbdb;
            border-top-color: #000;
            border-left-color: #000;
            top: 2px;
        }

        .mc-btn:hover {
            background-color: var(--mc-green);
            border-top-color: #56ad43;
            border-left-color: #56ad43;
        }

        /* --- JUMPSCARE & EXPLOSION EFFECTS --- */
        #creeper-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }

        .creeper-img {
            width: 250px;
            image-rendering: pixelated;
        }

        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        /* Flash white */
        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            z-index: 200;
        }

        /* --- PARTICLE EFFECT CONTAINER --- */
        #particle-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        .particle {
            position: absolute;
            width: 10px; height: 10px;
            image-rendering: pixelated;
            opacity: 0;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="panorama-container"></div>

    <div id="particle-container"></div>

    <div class="ui-wrapper">
        
        <div class="mc-panel" id="login-screen">
            <h1 class="mc-logo">Minecraft</h1>
            <span class="splash-text">Birthday Edition!</span>
            <div style="margin-top: 30px;">
                <p>Player Name:</p>
                <input type="text" id="username" placeholder="Enter 'Nesha'" autocomplete="off">
                <button class="mc-btn" onclick="startSequence()">PLAY</button>
            </div>
        </div>

        <div class="mc-panel hidden" id="birthday-screen">
            <img src="https://minecraft.wiki/images/Cake_JE4_BE2.png" width="120" style="margin-bottom: 20px;">
            <h1 class="mc-logo" style="color: #55ff55;">BOOM!</h1>
            <p style="font-size: 1.8rem;">Happy 24th Birthday, <span style="color: #FFFF55;">Nesha</span>!</p>
            <p style="color: #AAAAAA; font-size: 1.2rem; margin-bottom: 25px;">You survived the Creeper!</p>
            <button class="mc-btn" onclick="location.reload()">Back to Menu</button>
        </div>

    </div>

    <div id="creeper-overlay">
        <div style="text-align: center;">
            <img src="https://minecraft.wiki/images/Creeper_JE2_BE2.png" class="creeper-img" id="creeper-sprite">
            <h1 id="hiss-text" style="color: #55ff55; font-size: 3rem; display: none; text-shadow: 3px 3px 0 #000;">Ssssssssss...</h1>
        </div>
    </div>

    <div id="flash"></div>

    <script>
        function startSequence() {
            const name = document.getElementById('username').value;
            // Validasi nama (tidak case-sensitive)
            if (name.toLowerCase() !== "nesha") {
                alert("Unrecognized Player! Are you sure you are Nesha?");
                return;
            }

            // 1. Sembunyikan Login
            document.getElementById('login-screen').classList.add('hidden');
            
            // 2. Munculkan Creeper & Suara Desis
            const overlay = document.getElementById('creeper-overlay');
            const hissText = document.getElementById('hiss-text');
            const creeperSprite = document.getElementById('creeper-sprite');
            
            overlay.style.display = 'flex';

            // Suara klik menu (opsional, coba cari URL yang valid jika ini mati)
            new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3').play();

            // Delay sebentar sebelum berdesis
            setTimeout(() => {
                hissText.style.display = 'block';
                creeperSprite.classList.add('shake');
                // Suara Hiss
                new Audio('https://www.myinstants.com/media/sounds/creeper-hiss.mp3').play();
            }, 800);

            // 3. Ledakan! (Flash + Partikel + Suara Boom)
            setTimeout(() => {
                // Suara Boom
                new Audio('https://www.myinstants.com/media/sounds/minecraft-explosion-sound.mp3').play();

                // Efek Flash
                const flash = document.getElementById('flash');
                flash.style.display = 'block';
                overlay.style.display = 'none';

                // Buat Partikel
                createExplosionParticles();

                // Sembunyikan Flash & Tampilkan ucapan
                setTimeout(() => {
                    flash.style.display = 'none';
                    document.getElementById('birthday-screen').classList.remove('hidden');
                }, 250); // Flash sangat cepat

            }, 3200); // Total waktu jumpscare
        }

        // --- SISTEM PARTIKEL SEDERHANA ---
        function createExplosionParticles() {
            const container = document.getElementById('particle-container');
            const colors = ['#FF5555', '#FFAA00', '#FFFFFF', '#555555']; // Merah, Oranye, Putih, Abu

            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Posisi awal di tengah layar
                p.style.left = '50%';
                p.style.top = '50%';

                container.appendChild(p);

                // Arah gerak acak
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5;
                const velocityX = Math.cos(angle) * speed;
                const velocityY = Math.sin(angle) * speed;

                // Animasikan
                let opacity = 1;
                let posX = 50; 
                let posY = 50;

                const particleInterval = setInterval(() => {
                    posX += velocityX / 10;
                    posY += velocityY / 10;
                    opacity -= 0.02;

                    p.style.left = posX + '%';
                    p.style.top = posY + '%';
                    p.style.opacity = opacity;

                    if (opacity <= 0) {
                        clearInterval(particleInterval);
                        p.remove();
                    }
                }, 20);
            }
        }
    </script>
</body>
</html>
