<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Adventure - Nesha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --mc-font: 'VT323', monospace;
            --mc-green: #3c8d2d;
            --mc-shadow: #1e1e1e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--mc-font);
            color: white;
            background-color: #222; /* Warna dasar agar tidak putih */
            image-rendering: pixelated;
        }

        /* --- BACKGROUND IMPROVED --- */
        .panorama-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Menggunakan gambar dari sumber yang lebih stabil */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://i.imgur.com/8SInmS0.png'); 
            background-size: cover;
            background-position: center;
            filter: blur(4px);
            z-index: -1;
            animation: panoramaScroll 100s linear infinite;
        }

        @keyframes panoramaScroll {
            from { background-position: 0% center; }
            to { background-position: 100% center; }
        }

        .ui-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .mc-panel {
            background: #c6c6c6; /* Klasik warna menu Minecraft */
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px #ffffff, inset -4px -4px 0px #555, 10px 10px 0px rgba(0,0,0,0.5);
            padding: 30px;
            text-align: center;
            width: 380px;
            color: #333;
        }

        .mc-logo {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 4px 4px 0px var(--mc-shadow);
            margin: 0;
        }

        .splash-text {
            color: #FFFF55;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0px #3F3F00;
            display: inline-block;
            transform: rotate(-15deg);
            animation: splashPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes splashPulse {
            from { transform: rotate(-15deg) scale(1); }
            to { transform: rotate(-15deg) scale(1.1); }
        }

        input[type="text"] {
            font-family: var(--mc-font);
            font-size: 1.5rem;
            background-color: #000;
            border: 2px solid #555;
            color: #55ff55;
            padding: 8px;
            width: 80%;
            margin: 20px 0;
            text-align: center;
        }

        .mc-btn {
            font-family: var(--mc-font);
            font-size: 1.8rem;
            color: white;
            background-color: #6e6e6e;
            border: 4px solid #000;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
        }

        .mc-btn:hover { background-color: var(--mc-green); }

        /* JUMPSCARE */
        #creeper-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 100;
        }

        .creeper-img { width: 250px; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            z-index: 200;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="panorama-container"></div>

    <div class="ui-wrapper">
        <div class="mc-panel" id="login-screen">
            <h1 class="mc-logo">Minecraft</h1>
            <span class="splash-text">Birthday Edition!</span>
            <div style="margin-top: 20px;">
                <p style="font-size: 1.5rem;">Player Name:</p>
                <input type="text" id="username" placeholder="Enter 'Nesha'">
                <button class="mc-btn" onclick="startSequence()">PLAY</button>
            </div>
        </div>

        <div class="mc-panel hidden" id="birthday-screen">
            <img src="https://i.imgur.com/uS8xYfX.png" width="100">
            <h1 class="mc-logo" style="color: #55ff55;">BOOM!</h1>
            <h2 style="margin: 10px 0;">Happy Birthday, Nesha!</h2>
            <p style="font-size: 1.2rem;">LEVEL 24 REACHED!</p>
            <button class="mc-btn" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <div id="creeper-overlay">
        <div style="text-align: center;">
            <img src="https://i.imgur.com/6U8YpB7.png" class="creeper-img" id="creeper-sprite">
            <h1 id="hiss-text" style="color: #55ff55; font-size: 3rem; display: none;">Ssssssssss...</h1>
        </div>
    </div>

    <div id="flash"></div>

    <script>
        function startSequence() {
            const name = document.getElementById('username').value;
            if (name.toLowerCase() !== "nesha") {
                alert("Only Nesha can enter!");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            const overlay = document.getElementById('creeper-overlay');
            const hissText = document.getElementById('hiss-text');
            const creeperSprite = document.getElementById('creeper-sprite');
            
            overlay.style.display = 'flex';

            setTimeout(() => {
                hissText.style.display = 'block';
                creeperSprite.classList.add('shake');
                new Audio('https://www.myinstants.com/media/sounds/creeper-hiss.mp3').play();
            }, 500);

            setTimeout(() => {
                new Audio('https://www.myinstants.com/media/sounds/minecraft-explosion-sound.mp3').play();
                document.getElementById('flash').style.display = 'block';
                overlay.style.display = 'none';

                setTimeout(() => {
                    document.getElementById('flash').style.display = 'none';
                    document.getElementById('birthday-screen').classList.remove('hidden');
                }, 200);
            }, 3000);
        }
    </script>
</body>
</html>
