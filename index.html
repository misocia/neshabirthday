<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Birthday Adventure - Nesha</title>
    <style>
        /* Import Minecraft Font */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --mc-font: 'VT323', monospace;
            --mc-green: #3c8d2d;
            --mc-shadow: #1e1e1e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--mc-font);
            color: white;
            image-rendering: pixelated;
        }

        /* --- BACKGROUND INTERAKTIF: GRADASI LANGIT MALAM --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Biru gelap ke Ungu Gelap khas Minecraft Night */
            background: linear-gradient(180deg, #02021c 0%, #1a0129 100%);
            z-index: -2;
        }

        /* Container untuk UI agar berada di atas canvas */
        .ui-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* --- UI PANEL: GAYA MENU MINECRAFT --- */
        .mc-panel {
            background: #c6c6c6; 
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px #ffffff, inset -4px -4px 0px #555, 10px 10px 0px rgba(0,0,0,0.5);
            padding: 30px;
            text-align: center;
            width: 380px;
            color: #333;
            transition: transform 0.2s ease;
        }

        .mc-panel:hover {
            transform: scale(1.02);
        }

        .mc-logo {
            font-size: 3.8rem;
            color: #fff;
            text-shadow: 5px 5px 0px var(--mc-shadow);
            margin: 0;
            margin-bottom: 5px;
        }

        .splash-text {
            color: #FFFF55;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0px #3F3F00;
            display: inline-block;
            transform: rotate(-15deg);
            animation: splashPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes splashPulse {
            from { transform: rotate(-15deg) scale(1); }
            to { transform: rotate(-15deg) scale(1.1); }
        }

        /* --- INPUT & BUTTON STYLING --- */
        input[type="text"] {
            font-family: var(--mc-font);
            font-size: 1.5rem;
            background-color: #000;
            border: 2px solid #555;
            color: #55ff55;
            padding: 8px;
            width: 85%;
            margin: 25px 0;
            text-align: center;
            outline: none;
        }

        .mc-btn {
            font-family: var(--mc-font);
            font-size: 1.8rem;
            color: white;
            background-color: #6e6e6e;
            border: 4px solid #000;
            border-top-color: #dbdbdb;
            border-left-color: #dbdbdb;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            position: relative;
            text-shadow: 2px 2px 0px #000;
        }

        .mc-btn:active {
            top: 2px;
            border-top-color: #000;
            border-left-color: #000;
            border-bottom-color: #dbdbdb;
            border-right-color: #dbdbdb;
        }

        .mc-btn:hover {
            background-color: var(--mc-green);
        }

        /* --- JUMPSCARE & EFFECTS --- */
        #creeper-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }

        .creeper-img { 
            width: 250px; 
            image-rendering: pixelated;
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            z-index: 200;
        }

        /* Utility Class untuk menyembunyikan elemen */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="ui-wrapper">
        <div class="mc-panel" id="login-screen">
            <h1 class="mc-logo">Minecraft</h1>
            <span class="splash-text">Birthday Edition!</span>
            <div style="margin-top: 20px;">
                <p style="font-size: 1.6rem; margin: 0; color: #555;">Player Name:</p>
                <input type="text" id="username" placeholder="Enter 'Nesha'" autocomplete="off">
                <button class="mc-btn" onclick="startSequence()">PLAY</button>
            </div>
        </div>

        <div class="mc-panel hidden" id="birthday-screen">
            <img src="cake.jpg" width="120" style="image-rendering: pixelated; margin-bottom: 10px;" alt="Birthday Cake">
            <h1 class="mc-logo" style="color: #55ff55; text-shadow: 4px 4px 0 #1e1e1e;">BOOM!</h1>
            <h2 style="margin: 10px 0; font-size: 2rem;">Happy Birthday, Nesha!</h2>
            <p style="font-size: 1.4rem; color: #FFFF55;">ACHIEVEMENT: SURVIVED THE CREEPER!</p>
            <button class="mc-btn" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <div id="creeper-overlay">
        <div style="text-align: center;">
            <img src="creeper.jpg" class="creeper-img" id="creeper-sprite" alt="Creeper">
            <h1 id="hiss-text" style="color: #55ff55; font-size: 3.5rem; display: none; margin-top: 15px; text-shadow: 3px 3px 0 #000;">Ssssssssss...</h1>
        </div>
    </div>

    <div id="flash"></div>

    <script>
        // --- JAVASCRIPT UNTUK PARTIKEL TERBANG (VEKTOR) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // Atur ukuran canvas sesuai layar
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Panggil pertama kali

        // Class untuk Partikel Tunggal
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Ukuran pixelated (kotak)
                this.size = Math.random() * 4 + 2; 
                this.speedX = Math.random() * 0.5 - 0.25; // Gerak horizontal lambat
                this.speedY = Math.random() * 1.5 + 0.5;  // Jatuh/terbang ke bawah perlahan
                // Warna partikel (sparkle putih ke kuning terang)
                this.color = `rgba(255, 255, ${Math.random() * 100 + 155}, ${Math.random() * 0.5 + 0.2})`;
            }

            // Perbarui posisi partikel
            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                // Reset jika partikel keluar dari bawah layar
                if (this.y > canvas.height) {
                    this.y = 0 - this.size;
                    this.x = Math.random() * canvas.width;
                }
            }

            // Gambar partikel sebagai kotak pixelated
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // Buat kumpulan partikel
        const particlesArray = [];
        const numberOfParticles = 80; // Jumlah partikel di layar

        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }

        // Fungsi Animasi Utama
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles(); // Mulai animasi

        // --- JAVASCRIPT UNTUK LOGIKA JUMPSCARE ---
        function startSequence() {
            const name = document.getElementById('username').value;
            // Validasi nama
            if (name.toLowerCase() !== "nesha") {
                alert("Player unrecognized! Are you really Nesha?");
                return;
            }

            // Jalankan suara klik (menggunakan link umum)
            new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3').play();

            document.getElementById('login-screen').classList.add('hidden');
            const overlay = document.getElementById('creeper-overlay');
            const hissText = document.getElementById('hiss-text');
            const creeperSprite = document.getElementById('creeper-sprite');
            
            overlay.style.display = 'flex';

            // Tahap 1: Muncul Creeper + Suara Desis
            setTimeout(() => {
                hissText.style.display = 'block';
                creeperSprite.classList.add('shake');
                new Audio('https://www.myinstants.com/media/sounds/creeper-hiss.mp3').play();
            }, 700);

            // Tahap 2: Ledakan + Ganti Layar Birthday
            setTimeout(() => {
                new Audio('https://www.myinstants.com/media/sounds/minecraft-explosion-sound.mp3').play();
                document.getElementById('flash').style.display = 'block';
                overlay.style.display = 'none';

                // Partikel terbang jadi sedikit lebih cepat saat ledakan
                for(let i=0; i<particlesArray.length; i++) {
                    particlesArray[i].speedY = Math.random() * 5 + 2;
                }

                // Sembunyikan Flash & Munculkan ucapan
                setTimeout(() => {
                    document.getElementById('flash').style.display = 'none';
                    document.getElementById('birthday-screen').classList.remove('hidden');
                }, 200);
            }, 3200);
        }
    </script>
</body>
</html>
